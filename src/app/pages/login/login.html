<div class="auth-page d-flex align-items-center justify-content-center min-vh-100 position-relative">
  <!-- Back to Home -->
  <a routerLink="/"
    class="back-btn text-white position-absolute top-0 start-0 m-4 d-flex align-items-center gap-2 text-decoration-none">
    <i class="bi bi-arrow-left fs-4"></i>
    <span class="fw-bold">Back to Home</span>
  </a>

  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-8 col-lg-6 col-xl-5">
        <div class="auth-card p-5 shadow-lg rounded-4">
          <div class="text-center mb-5">
            <h1 class="logo-text text-white mb-3">True Load</h1>
            <h3 class="text-atc-gold fw-bold font-secondary">Welcome Back</h3>
            <p class="text-white opacity-75">Log in to your True Load account</p>
          </div>

          <form>
            <div class="mb-4">
              <label class="form-label text-white fw-bold">Email Address</label>
              <input type="email" class="form-control auth-input p-3" placeholder="name@example.com">
            </div>

            <div class="mb-4">
              <div class="d-flex justify-content-between align-items-center mb-2">
                <label class="form-label text-white fw-bold mb-0">Password</label>
                <a href="#" class="text-atc-teal text-decoration-none small fw-bold">Forgot Password?</a>
              </div>
              <input type="password" class="form-control auth-input p-3" placeholder="Enter your password">
            </div>

            <div class="mb-5 form-check">
              <input type="checkbox" class="form-check-input custom-checkbox" id="rememberMe">
              <label class="form-check-label text-white opacity-75 ms-2" for="rememberMe">Remember me</label>
            </div>

            <button type="submit" class="btn btn-atc-teal w-100 rounded-pill py-3 fw-bold fs-5 mb-4 shadow">Log
              In</button>

            <p class="text-center text-white opacity-75 mb-0">
              Don't have an account? <a routerLink="/register"
                class="text-atc-gold text-decoration-none fw-bold ms-1 hover-underline">Register here</a>
            </p>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

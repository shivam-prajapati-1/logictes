<section class="hero-section">
  <!-- Slider Backgrounds -->
  <div class="hero-slider">
    <div *ngFor="let slide of slides; let i = index" 
         class="slide" 
         [class.active]="i === currentSlide"
         [style.backgroundImage]="'url(' + slide.image + ')'">
    </div>
  </div>

  <div class="hero-overlay"></div>
  
  <div class="container h-100 position-relative z-index-1">
    <div class="row h-100 align-items-center">
      <div class="col-lg-7">
        <div *ngFor="let slide of slides; let i = index" 
             class="hero-content"
             [class.active-content]="i === currentSlide">
          <h1 class="hero-title text-white" [innerHTML]="slide.title"></h1>
          <p class="hero-subtitle mt-4 mb-4 text-white" [innerHTML]="slide.subtitle"></p>
          <div class="d-flex gap-3 mt-5">
            <a *ngIf="slide.buttonLink !== 'modal'" [routerLink]="slide.buttonLink" class="btn btn-atc-teal btn-lg rounded-pill px-5 hero-btn">
              {{ slide.buttonText }}
            </a>
            <button *ngIf="slide.buttonLink === 'modal'" (click)="openQuoteModal()" class="btn btn-atc-teal btn-lg rounded-pill px-5 hero-btn">
              {{ slide.buttonText }}
            </button>
          </div>
        </div>
      </div>
    </div>
    
    <!-- Mastery Text overlay (bottom right) -->
    <div class="mastery-text" *ngIf="slides[currentSlide]">
      {{ slides[currentSlide].masteryText }}
    </div>

    <!-- Slider Dots -->
    <div class="slider-dots">
      <span *ngFor="let slide of slides; let i = index" 
            [class.active]="i === currentSlide" 
            (click)="setSlide(i)"></span>
    </div>
  </div>
</section>

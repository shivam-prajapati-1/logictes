      <ul class="navbar-nav mx-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link" routerLink="/" routerLinkActive="active"
            [routerLinkActiveOptions]="{exact: true}">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/about" routerLinkActive="active">
            About
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/services" routerLinkActive="active">Services</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/career" routerLinkActive="active">Career</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/contact" routerLinkActive="active">Contact Us</a>
        </li>

<!-- Tracking Modal Overlay - Moved outside nav for layout safety -->
<div class="tracking-modal-overlay" *ngIf="showTrackingModal" (click)="toggleTrackingModal()">
  <div class="tracking-modal-card p-4 p-md-5 shadow-lg position-relative" (click)="$event.stopPropagation()">
    <button class="close-btn position-absolute top-0 end-0 m-3 border-0 bg-transparent" (click)="toggleTrackingModal()">
      <i class="bi bi-x-lg fs-5"></i>
    </button>

    <div class="text-center">
      <h2 class="font-secondary fw-bold mb-4 tracking-title">Track Consignment</h2>

      <div class="input-group tracking-input-group mt-4 mb-2">
        <input type="text" class="form-control p-3 border-end-0 rounded-start-4"
          placeholder="Enter Your Consignment number" [(ngModel)]="trackingNumber" (keyup.enter)="onTrack()">
        <button class="btn btn-atc-teal px-4 fw-bold rounded-end-4" type="button" (click)="onTrack()">Go</button>
      </div>
    </div>
  </div>
</div>
